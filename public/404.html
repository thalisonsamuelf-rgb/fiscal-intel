<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Fiscal Intel</title>
  <script>
    // Redireciona para index.html preservando o path (para React Router funcionar no GitHub Pages)
    var l = window.location;
    l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + 1).join('/') + '/?p=' +
      l.pathname.slice(1).split('/').slice(1).join('/').replace(/&/g, '~and~') +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash);
  </script>
</head>
<body></body>
</html>
